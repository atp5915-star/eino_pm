<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>文心健康管家</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #00c8c8;
  --primary-light: #e8fafa;
  --bg: linear-gradient(180deg, #f2f6ff 0%, #e1eaff 100%);
  --card-bg: #fff;
  --text: #000311;
  --text-secondary: #272933;
  --text-tertiary: #848691;
  --border: #e8eef5;
  --user-bubble-bg: #b2eeee;
  --bot-bubble-bg: #ffffff;
  --radius: 16px;
}
html, body { height: 100%; font-family: "PingFang SC", "Droid Sans Fallback", PingFangSC-Regular, -apple-system, BlinkMacSystemFont, Arial, Helvetica, sans-serif; background: #f0f2f5; color: #000311; }
body { display: flex; }

/* Layout: phone + trace side panel */
.layout { display: flex; width: 100%; height: 100%; justify-content: center; }

/* Phone screen - no frame, just H5 page */
.phone-screen {
  width: 420px; min-width: 420px; height: 100%;
  background:
    url('https://med-fe.cdn.bcebos.com/wenzhen-mini-app/aiContainerBg.png') top center / 100% 56% no-repeat,
    var(--bg);
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* Trace side panel */
.trace-panel {
  width: 380px; min-width: 380px; background: #f9fafb; display: none; flex-direction: column;
  border-left: 1px solid #e5e7eb; margin-left: 12px; border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.06); overflow: hidden; height: 100%;
}
.trace-panel.open { display: flex; }
.trace-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; border-bottom: 1px solid #e5e7eb; background: #fff;
}
.trace-header h3 { color: #333; font-size: 13px; font-weight: 600; }
.trace-header .close-btn { background: none; border: none; color: #999; font-size: 18px; cursor: pointer; }
.trace-header .close-btn:hover { color: #333; }
.trace-header .clear-btn { background: none; border: 1px solid #ddd; color: #666; font-size: 11px; padding: 3px 10px; border-radius: 4px; cursor: pointer; }
.trace-header .clear-btn:hover { border-color: #999; color: #333; }
.trace-content {
  flex: 1; overflow-y: auto; padding: 10px 12px;
  font-family: "SF Mono", "Fira Code", Monaco, monospace; font-size: 12px;
  line-height: 1.6;
}
.trace-entry { margin-bottom: 8px; padding: 8px 10px; background: #fff; border-radius: 6px; border-left: 3px solid #ddd; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.trace-entry.type-send { border-left-color: #3b9eff; }
.trace-entry.type-a2ui { border-left-color: #8b5cf6; }
.trace-entry.type-error { border-left-color: #ef4444; }
.trace-entry.type-session { border-left-color: #10b981; }
.trace-entry.type-init { border-left-color: #f59e0b; }
.trace-meta { display: flex; justify-content: space-between; margin-bottom: 4px; }
.trace-time { color: #9ca3af; font-size: 11px; }
.trace-type { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.trace-type.send { color: #2563eb; }
.trace-type.a2ui { color: #7c3aed; }
.trace-type.error { color: #dc2626; }
.trace-type.session { color: #059669; }
.trace-type.init { color: #d97706; }
.trace-body { color: #374151; white-space: pre-wrap; word-break: break-all; font-size: 11px; }
.trace-body .key { color: #2563eb; }
.trace-body .str { color: #059669; }
.trace-body .num { color: #d97706; }

/* Header */
.app-header {
  background: transparent;
  padding: 14px 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.app-header .left { display: flex; align-items: center; gap: 12px; }
.app-header .back-btn { background: none; border: none; font-size: 18px; color: #333; cursor: pointer; }
.app-header .title-group { }
.app-header .title { font-size: 18.7px; font-weight: 500; color: #000311; line-height: 18.7px; }
.app-header .subtitle { font-size: 11px; font-weight: 400; color: #888; margin-top: 3px; }
.app-header .icon-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,.5); border: none; color: #000311;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; line-height: 1;
  transition: background .15s;
}
.app-header .icon-btn:hover { background: rgba(255,255,255,.8); }
.app-header .right-actions { display: flex; gap: 8px; align-items: center; }

/* External trace toggle (outside phone) */
.external-trace-btn {
  position: absolute; top: 16px; left: calc(50% + 220px);
  background: #fff; border: 1px solid #e5e7eb; color: #333;
  font-size: 12px; padding: 6px 14px; border-radius: 16px; cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.external-trace-btn:hover { background: #f5f6fa; }
.external-trace-btn.hidden { display: none; }

/* Banner */
.banner {
  background: transparent;
  padding: 4px 4px 16px;
  flex-shrink: 0;
}
.banner-text {
  color: #000311; font-size: 18.7px; font-weight: 500;
  line-height: 29px; letter-spacing: 0.5px;
}
.service-card {
  background: #fff; border-radius: 14px; padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.04); margin-top: 14px;
}
.service-card .avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, #3b9eff, #00c6ff);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 20px; font-weight: 700;
}
.service-card .info { flex: 1; }
.service-card .info .name { font-size: 16.6px; font-weight: 500; color: #000311; line-height: 1.2; }
.service-card .info .desc { font-size: 12.5px; font-weight: 400; color: #999; margin-top: 4px; }
.service-card .arrow { color: #ccc; font-size: 18px; }

/* Chat area */
.chat-area {
  flex: 1; overflow-y: auto; padding: 16px 16px;
  display: flex; flex-direction: column; gap: 14px;
  -webkit-overflow-scrolling: touch;
}

/* Messages */
.msg-row { display: flex; align-items: flex-start; }
.msg-row.user { justify-content: flex-end; }
.msg-bubble {
  max-width: 78%; padding: 12px 16px; font-size: 17.7px; font-weight: 400;
  line-height: 30px; letter-spacing: 0.5px; word-break: break-word; color: #000311;
}
.msg-bubble.bot { max-width: 100%; flex: 1; }
.msg-bubble.bot {
  background: var(--bot-bubble-bg); color: #000311; border-radius: 4px 16px 16px 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.msg-bubble.user {
  background: var(--user-bubble-bg); color: #000311; border-radius: 16px 4px 16px 16px;
}
.msg-bubble p { margin-bottom: 0.5em; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble ul, .msg-bubble ol { padding-left: 1.2em; margin: 4px 0; }
.msg-bubble li { margin-bottom: 3px; }
.msg-bubble pre { background: #e8ecf0; border-radius: 8px; padding: 8px 10px; overflow-x: auto; font-size: 12px; margin: 6px 0; }
.msg-bubble code { font-size: 12px; }

/* Medical service big card */
.medical-card {
  margin-top: 12px; padding: 14px 0 4px; background: #fff; border-radius: 18px;
  color: #000311; overflow: hidden;
}
.medical-card .medical-intro {
  padding: 0 2px 14px; font-size: 17px; line-height: 30px; letter-spacing: .3px;
}
.medical-card .medical-intro strong { font-weight: 700; }
.medical-card .medical-cert {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2px 12px; border-bottom: 1px solid #eef1f5;
  font-size: 13px; color: #848691;
}
.medical-card .medical-cert .cert-left { display: flex; align-items: center; gap: 6px; color: #272933; font-weight: 500; }
.medical-card .section-title {
  margin: 16px 0 12px; padding-left: 12px; border-left: 4px solid #18d5d5;
  font-size: 18px; font-weight: 700; line-height: 24px;
}
.medical-card .medical-list { display: flex; flex-direction: column; }
.medical-card .medical-item {
  display: flex; gap: 12px; padding: 14px 2px; border-bottom: 1px solid #eef1f5;
}
.medical-card .medical-item:last-child { border-bottom: none; }
.medical-card .item-main { flex: 1; min-width: 0; }
.medical-card .item-title { font-size: 16px; font-weight: 700; line-height: 22px; color: #000311; }
.medical-card .item-title .muted { margin-left: 6px; font-size: 13px; font-weight: 400; color: #848691; }
.medical-card .item-sub { margin-top: 4px; font-size: 13px; line-height: 18px; color: #4b5563; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.medical-card .item-tags { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
.medical-card .tag { padding: 1px 5px; border-radius: 4px; font-size: 11px; line-height: 16px; color: #8b5a20; background: #fff2d8; }
.medical-card .tag.green { color: #21a66b; background: #e9f8f1; }
.medical-card .tag.red { color: #ef4444; background: #fff0f0; }
.medical-card .item-meta { margin-top: 6px; font-size: 12px; line-height: 18px; color: #848691; }
.medical-card .item-meta strong { color: #00bfbf; font-weight: 600; }
.medical-card .item-right { width: 76px; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
.medical-card .price { font-size: 17px; font-weight: 700; color: #ef4444; line-height: 20px; }
.medical-card .price small { font-size: 11px; color: #b9bdc6; font-weight: 400; }
.medical-card .buy-btn {
  min-width: 68px; height: 34px; padding: 0 12px; border-radius: 17px; border: none;
  background: linear-gradient(to right, #00CFA3, #00D3EA); color: #fff;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
.medical-card .avatar, .medical-card .logo, .medical-card .product-img {
  width: 54px; height: 54px; flex-shrink: 0; border-radius: 50%; background: #e9f8ff;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  color: #00a6a6; font-size: 18px; font-weight: 700;
}
.medical-card .avatar img, .medical-card .logo img, .medical-card .product-img img { width: 100%; height: 100%; object-fit: cover; }
.medical-card .logo { border-radius: 12px; background: #f7f8fb; color: #9b1c1c; font-size: 12px; text-align: center; }
.medical-card .product-img { width: 112px; height: 92px; border-radius: 10px; background: linear-gradient(135deg, #dcfff6, #f4fff0); color: #00a67d; font-size: 14px; }
.medical-card .product-row .item-title { font-size: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; white-space: normal; overflow: hidden; }
.medical-card .plan-row { padding: 12px 2px; }
.medical-card .plan-row .item-main { display: flex; flex-direction: column; gap: 3px; }
.medical-card .free-badge { display: inline-block; margin-left: 6px; padding: 1px 5px; border-radius: 4px; background: #6b4a38; color: #fff; font-size: 11px; }
.medical-card .hospital-actions { display: flex; gap: 10px; margin-top: 12px; }
.medical-card .hospital-actions .buy-btn { flex: 1; background: #e5fbf8; color: #000311; }
.medical-card .more-link { text-align: center; padding: 12px 0 4px; color: #9aa0a6; font-size: 14px; }
.medical-card .medical-tip {
  margin-top: 14px; padding: 10px; border-radius: 8px; background: #f1f3f7;
  color: #9aa0a6; font-size: 12px; text-align: center;
}

/* Service mount card */
.service-mount-card {
  width: 100%; margin-top: 18px; padding: 12px;
  background: #f1faff; border: none; border-radius: 12px;
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  transition: transform .15s ease, background .15s ease;
}
.service-mount-card:active { transform: scale(.98); background: #eaf8ff; }
.service-mount-card .service-icon {
  width: 54px; height: 54px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #e7fbff 0%, #d5f2ff 100%);
  box-shadow: 0 4px 12px rgba(0,200,200,.12); overflow: hidden;
}
.service-mount-card .service-icon svg { width: 34px; height: 34px; }
.service-mount-card .service-info { flex: 1; min-width: 0; }
.service-mount-card .service-title {
  font-size: 17px; font-weight: 600; line-height: 22px; color: #000311;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.service-mount-card .service-desc {
  margin-top: 4px; font-size: 13px; font-weight: 400; line-height: 18px; color: #848691;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.service-mount-card .service-action {
  flex-shrink: 0; min-width: 76px; height: 38px; border: none; border-radius: 19px;
  background: linear-gradient(to right, #00CFA3, #00D3EA); color: #fff;
  font-size: 15px; font-weight: 500; display: flex; align-items: center; justify-content: center;
  padding: 0 14px;
}

/* Message actions */
.message-actions {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 18px;
}
.message-actions .left-actions { display: flex; gap: 16px; }
.message-action-btn {
  width: 34px; height: 34px; border-radius: 50%; border: none; background: #f7f8fb; color: #272933;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.message-action-btn svg { width: 21px; height: 21px; stroke: currentColor; }
.message-action-btn:active { transform: scale(.95); }

/* Typing */
.typing-dots { display: inline-flex; gap: 5px; padding: 14px 16px; background: var(--bot-bubble-bg); border-radius: 4px 16px 16px 16px; }
.typing-dots span {
  width: 8px; height: 8px; border-radius: 50%; background: #bbb;
  animation: bounce 1.4s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

/* Follow-up suggestions */
.followup-list { display: flex; flex-direction: column; gap: 10px; padding: 4px 0; align-items: flex-start; }
.followup-item {
  background: #fff; border: none; border-radius: 22px;
  padding: 11px 18px; font-size: 15px; font-weight: 400; color: #000311;
  cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
  transition: all .15s; box-shadow: 0 1px 4px rgba(0,0,0,.04);
  width: auto;
}
.followup-item:active { background: #f0f7ff; transform: scale(0.98); }
.followup-item::before { content: "✦"; color: #4dd3a8; font-size: 13px; }

/* Service prompt bubbles */
.service-prompt-list {
  display: flex; flex-direction: column; gap: 14px;
  align-items: flex-start;
}
.msg-row.service-prompts { justify-content: flex-start; margin-top: -2px; }
.service-prompt-chip {
  min-height: 36px; padding: 10.36px 12.25px;
  border-radius: 10px; border: none; background: #fff;
  color: #000311; font-size: 15.07px; font-weight: 400; line-height: 20px;
  font-family: "PingFang SC", "Droid Sans Fallback", PingFangSC-Regular, -apple-system, BlinkMacSystemFont, Arial, Helvetica, sans-serif;
  display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,.03);
  transition: transform .15s ease, background .15s ease;
}
.service-prompt-chip:active { transform: scale(.98); background: #f9fbff; }
.service-prompt-chip.service-entry { padding-left: 12.25px; }
.service-prompt-icon {
  width: 22px; height: 22px; flex-shrink: 0; border-radius: 7px;
  display: inline-flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.service-prompt-icon svg { width: 22px; height: 22px; display: block; }

/* Service chips */
.service-chips {
  display: flex; gap: 10px; padding: 8px 16px;
  overflow-x: auto; flex-shrink: 0; background: transparent;
}
.service-chip {
  display: flex; align-items: center; gap: 5px;
  background: #fff; border-radius: 18px; padding: 7px 14px;
  font-size: 13px; color: var(--text); white-space: nowrap;
  box-shadow: 0 1px 4px rgba(0,0,0,.04); cursor: pointer;
}
.service-chip .dot { width: 7px; height: 7px; border-radius: 50%; }

/* Input bar */
.input-bar {
  background: transparent; border-top: none;
  padding: 10px 14px; display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.input-bar input {
  flex: 1; height: 40px; border: none; border-radius: 20px;
  padding: 0 16px; font-size: 14px; outline: none; background: rgba(255,255,255,.7);
}
.input-bar input:focus { background: #fff; }
.input-bar .image-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: transparent; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity .15s;
}
.input-bar .image-btn:hover { opacity: .6; }
.input-bar .send-btn {
  width: 56px; height: 40px; border-radius: 20px;
  background: linear-gradient(to right, #00CFA3, #00D3EA); border: none; color: #fff;
  font-size: 14px; font-weight: 500; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity .15s;
}
.input-bar .send-btn:hover { opacity: .9; }
.input-bar .send-btn:disabled { opacity: .5; cursor: default; }

/* Image preview above input */
.image-preview-bar {
  padding: 10px 14px 0; display: none; gap: 8px; flex-wrap: wrap;
}
.image-preview-bar.show { display: flex; }
.image-preview-item {
  position: relative; width: 64px; height: 64px; border-radius: 10px;
  background: #fff; border: 1px solid #e8eef5; overflow: hidden;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.image-preview-item img { width: 100%; height: 100%; object-fit: cover; }
.image-preview-item .remove-btn {
  position: absolute; top: 2px; right: 2px;
  width: 18px; height: 18px; border-radius: 50%;
  background: rgba(0,0,0,.5); color: #fff; border: none;
  font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  line-height: 1;
}

/* User image bubble */
.msg-bubble.user-image {
  background: transparent; padding: 0; max-width: 60%;
  border-radius: 12px; overflow: hidden;
}
.msg-bubble.user-image img { width: 100%; max-width: 200px; display: block; border-radius: 12px; }

</style>
</head>
<body>

<button class="external-trace-btn" id="trace-toggle">Trace</button>

<div class="layout">
  <!-- H5 Phone Page -->
  <div class="phone-screen" id="app">
    <!-- Header -->
    <div class="app-header">
      <div class="left">
        <button class="back-btn">&lt;</button>
        <div class="title-group">
          <div class="title">文心健康管家</div>
          <div class="subtitle">内容由AI生成</div>
        </div>
      </div>
      <div class="right-actions">
        <button class="icon-btn" title="历史对话">&#9201;</button>
        <button class="icon-btn" title="新对话">&#43;</button>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-area" id="chat-area">
      <div class="banner">
        <div class="banner-text">深夜降温了，盖好被子早<br/>点休息</div>
        <div class="service-card">
          <div class="avatar">+</div>
          <div class="info">
            <div class="name">在线问医生</div>
            <div class="desc">真实医生权威解答</div>
          </div>
          <div class="arrow">&rsaquo;</div>
        </div>
      </div>
      <div class="followup-list" id="initial-suggestions">
        <div class="followup-item" onclick="sendFromSuggestion(this)">降温天吃什么最暖身</div>
        <div class="followup-item" onclick="sendFromSuggestion(this)">熬夜后怎么快速回血</div>
        <div class="followup-item" onclick="sendFromSuggestion(this)">为什么总是觉得很累</div>
      </div>
    </div>

    <!-- Service chips -->
    <div class="service-chips">
      <div class="service-chip"><span class="dot" style="background:#3b9eff"></span> 在线问医生</div>
      <div class="service-chip"><span class="dot" style="background:#ff5252"></span> 新年祈福</div>
      <div class="service-chip"><span class="dot" style="background:#ff9800"></span> 每日健康运势</div>
    </div>

    <!-- Image preview area -->
    <div class="image-preview-bar" id="image-preview-bar"></div>

    <!-- Input -->
    <div class="input-bar">
      <input type="text" id="msg-input" placeholder="发消息或按住说话..." />
      <input type="file" id="image-input" accept="image/*" multiple style="display:none" />
      <button class="image-btn" id="image-btn" title="发送图片"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#000311" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="M21 16l-5-5-8 8"/></svg></button>
      <button class="send-btn" id="send-btn">发送</button>
    </div>

  </div>

  <!-- Trace Side Panel -->
  <div class="trace-panel" id="trace-panel">
    <div class="trace-header">
      <h3>Model Trace</h3>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="clear-btn" id="trace-clear">Clear</button>
        <button class="close-btn" id="trace-close">&times;</button>
      </div>
    </div>
    <div class="trace-content" id="trace-content"></div>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
let sessionId = null;
let isStreaming = false;
let abortCtrl = null;

// A2UI state

// ─── Trace Panel ────────────────────────────────────────────────────────────
const tracePanel = document.getElementById('trace-panel');
const traceContent = document.getElementById('trace-content');

document.getElementById('trace-toggle').addEventListener('click', () => {
  tracePanel.classList.add('open');
  document.getElementById('trace-toggle').classList.add('hidden');
});
document.getElementById('trace-close').addEventListener('click', () => {
  tracePanel.classList.remove('open');
  document.getElementById('trace-toggle').classList.remove('hidden');
});
document.getElementById('trace-clear').addEventListener('click', () => {
  traceContent.innerHTML = '';
});

function addTrace(type, data) {
  const time = new Date().toLocaleTimeString('zh-CN', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
  const ms = String(Date.now() % 1000).padStart(3, '0');
  const entry = document.createElement('div');
  entry.className = `trace-entry type-${type.toLowerCase()}`;

  let body = '';
  if (typeof data === 'string') {
    body = data;
  } else {
    body = formatJSON(data);
  }

  entry.innerHTML = `<div class="trace-meta"><span class="trace-type ${type.toLowerCase()}">${type}</span><span class="trace-time">${time}.${ms}</span></div><div class="trace-body">${body}</div>`;
  traceContent.appendChild(entry);
  traceContent.scrollTop = traceContent.scrollHeight;
}

function formatJSON(obj) {
  const str = JSON.stringify(obj, null, 2);
  return str.replace(/"([^"]+)":/g, '<span class="key">"$1"</span>:')
    .replace(/: "([^"]*)"/g, ': <span class="str">"$1"</span>')
    .replace(/: (\d+)/g, ': <span class="num">$1</span>');
}

// ─── Helpers ────────────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function attrEsc(s) { return esc(s).replace(/"/g, '&quot;'); }

function scrollChat() {
  const area = document.getElementById('chat-area');
  area.scrollTop = area.scrollHeight;
}

function chooseMedicalCardType(text) {
  const value = String(text || '');
  if (/在线问医生|免费咨询|真人咨询|问医生/.test(value)) return 'doctor';
  if (/肠胃专家|精准找医生|找医生|咨询.*专家|专家/.test(value)) return 'preciseDoctor';
  if (/买.*药|购买.*药|感冒颗粒|感冒胶囊|药品|去购买/.test(value)) return 'drugList';
  if (/医院|挂号|预约|治疗.*医院|找医院/.test(value)) return 'hospital';
  return '';
}

  if (/报告|化验|体检|指标|检查/.test(value)) return 'report';
  if (/皮肤|皮疹|痘|湿疹|过敏/.test(value)) return 'skin';
  if (/饮食|食谱|营养|苹果|吃什么|减脂|控糖/.test(value)) return 'diet';
  if (/档案|记录|保存|健康档案/.test(value)) return 'archive';
  if (/提醒|用药计划|服药/.test(value)) return 'medication';
  return 'doctor';
}

function enrichBotBubble(bubble, sourceText) {
  if (!bubble || bubble.dataset.enriched === 'true') return;
  bubble.dataset.enriched = 'true';
  const medicalType = chooseMedicalCardType(sourceText);
  const body = medicalType
    ? renderMedicalCard(medicalType)
    : (shouldUsePromptBubbles(sourceText) ? '' : renderServiceCard(chooseServiceCard(sourceText)));
  bubble.insertAdjacentHTML('beforeend', body + renderMessageActions());
  if (!medicalType) appendServicePrompts(sourceText);
}

// ─── UI ─────────────────────────────────────────────────────────────────────
function appendUserMsg(text) {
  const area = document.getElementById('chat-area');
  const sug = document.getElementById('initial-suggestions');
  if (sug) sug.remove();
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="msg-bubble user">${esc(text)}</div>`;
  area.appendChild(row);
  scrollChat();
}

function appendBotMsg(html) {
  const area = document.getElementById('chat-area');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.innerHTML = `<div class="msg-bubble bot">${html}</div>`;
  area.appendChild(row);
  scrollChat();
  return row.querySelector('.msg-bubble');
}

function showTyping() {
  const area = document.getElementById('chat-area');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-indicator';
  row.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
  area.appendChild(row);
  scrollChat();
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ─── Session ────────────────────────────────────────────────────────────────
async function ensureSession() {
  if (sessionId) return;
  const res = await fetch('/sessions', {method: 'POST'});
  const data = await res.json();
  sessionId = data.id;
  addTrace('SESSION', `Created: ${sessionId}`);
}

// ─── A2UI ───────────────────────────────────────────────────────────────────
let currentBotBubble = null;
let prevDataModel = {};
let tokenCount = 0;
let streamStartTime = 0;

function processA2UIMessage(msg) {
  if (msg.beginRendering) {
    tokenCount = 0;
    streamStartTime = Date.now();
    prevDataModel = {};
    addTrace('A2UI', 'Stream started');
    rootId = msg.beginRendering.root;
    components = {}; dataModel = {};
    return;
  }
  if (msg.surfaceUpdate) {
    const count = (msg.surfaceUpdate.components || []).length;
    if (Object.keys(components).length === 0) {
      addTrace('A2UI', `Component tree: ${count} nodes`);
    }
    for (const c of (msg.surfaceUpdate.components || [])) {
      components[c.id] = c.component;
    }
    return;
  }
  if (msg.dataModelUpdate) {
    for (const dc of (msg.dataModelUpdate.contents || [])) {
      const key = dc.key;
      const newVal = dc.valueString || '';
      const oldVal = prevDataModel[key] || '';
      const delta = newVal.slice(oldVal.length);
      if (delta) tokenCount++;
      prevDataModel[key] = newVal;
      dataModel[key] = newVal;
      updateBotBubble(key, newVal);
    }
    return;
  }
  addTrace('A2UI', msg);
}

function updateBotBubble(key, value) {
  for (const [id, comp] of Object.entries(components)) {
    if (comp.Text && comp.Text.dataKey === key && (comp.Text.usageHint || 'body') === 'body') {
      if (!currentBotBubble) {
        hideTyping();
        currentBotBubble = appendBotMsg('');
      }
      currentBotBubble.innerHTML = typeof marked !== 'undefined' ? marked.parse(value) : esc(value);
      scrollChat();
    }
  }
}

// ─── SSE ────────────────────────────────────────────────────────────────────
async function consumeSSE(res) {
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  try {
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed.startsWith('data:')) {
          const jsonStr = trimmed.slice(5).trimStart();
          if (!jsonStr) continue;
          try {
            const msg = JSON.parse(jsonStr);
            if (msg.error) { addTrace('ERROR', msg.error); continue; }
            processA2UIMessage(msg);
          } catch(_) {}
        }
      }
    }
  } catch(err) {
    if (abortCtrl && abortCtrl.signal.aborted) return;
    addTrace('ERROR', err.message);
  }
}

// ─── Send ───────────────────────────────────────────────────────────────────
async function sendMessage(text) {
  if (!text || isStreaming) return;
  await ensureSession();
  appendUserMsg(text);
  showTyping();
  currentBotBubble = null;
  isStreaming = true;
  document.getElementById('send-btn').disabled = true;
  addTrace('SEND', text);

  abortCtrl = new AbortController();
  try {
    const res = await fetch(`/sessions/${sessionId}/chat`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text}),
      signal: abortCtrl.signal,
    });
    if (!res.ok) {
      hideTyping();
      const err = await res.json().catch(() => ({error: res.statusText}));
      appendBotMsg(`<span style="color:#f44">Error: ${esc(err.error||res.statusText)}</span>`);
      addTrace('ERROR', err);
      return;
    }
    await consumeSSE(res);
    enrichBotBubble(currentBotBubble, text);
    if (tokenCount > 0) {
      const elapsed = ((Date.now() - streamStartTime) / 1000).toFixed(1);
      addTrace('SEND', `Done: ${tokenCount} tokens in ${elapsed}s (${(tokenCount / elapsed).toFixed(0)} tok/s)`);
    }
  } catch(err) {
    if (!abortCtrl.signal.aborted) { hideTyping(); addTrace('ERROR', err.message); }
  } finally {
    hideTyping();
    isStreaming = false;
    abortCtrl = null;
    document.getElementById('send-btn').disabled = false;
  }
}

// ─── Events ─────────────────────────────────────────────────────────────────
function flushSend() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  for (const img of pendingImages) {
    appendUserImageBubble(img.url);
    addTrace('SEND', `[image] ${img.file.name} (${(img.file.size/1024).toFixed(1)}KB)`);
  }
  pendingImages = [];
  renderPreviews();
  if (text) {
    input.value = '';
    sendMessage(text);
  }
}

document.getElementById('send-btn').addEventListener('click', flushSend);
document.getElementById('msg-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.isComposing) {
    e.preventDefault();
    flushSend();
  }
});
function sendFromSuggestion(el) { sendMessage(el.textContent.trim()); }

// ─── Image upload ───────────────────────────────────────────────────────────
let pendingImages = []; // [{url, file}]
const imageInput = document.getElementById('image-input');
const imageBtn = document.getElementById('image-btn');
const previewBar = document.getElementById('image-preview-bar');

imageBtn.addEventListener('click', () => imageInput.click());

imageInput.addEventListener('change', (e) => {
  const files = Array.from(e.target.files || []);
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    const url = URL.createObjectURL(file);
    pendingImages.push({url, file});
  }
  imageInput.value = '';
  renderPreviews();
});

function renderPreviews() {
  previewBar.innerHTML = '';
  if (pendingImages.length === 0) {
    previewBar.classList.remove('show');
    return;
  }
  previewBar.classList.add('show');
  pendingImages.forEach((img, idx) => {
    const item = document.createElement('div');
    item.className = 'image-preview-item';
    item.innerHTML = `<img src="${img.url}"/><button class="remove-btn" data-idx="${idx}">&times;</button>`;
    previewBar.appendChild(item);
  });
  previewBar.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      URL.revokeObjectURL(pendingImages[idx].url);
      pendingImages.splice(idx, 1);
      renderPreviews();
    });
  });
}

function appendUserImageBubble(url) {
  const area = document.getElementById('chat-area');
  const sug = document.getElementById('initial-suggestions');
  if (sug) sug.remove();
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="msg-bubble user-image"><img src="${url}"/></div>`;
  area.appendChild(row);
  scrollChat();
}

addTrace('INIT', 'Demo loaded. Ready to chat.');
</script>
