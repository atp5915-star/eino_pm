<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>文心健康管家</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #4facfe;
  --primary-dark: #2d8cf0;
  --bg: #f0f6ff;
  --card-bg: #fff;
  --text: #333;
  --text-secondary: #666;
  --border: #e8eef5;
  --user-bubble: #4facfe;
  --bot-bubble: #fff;
  --radius: 16px;
}
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif; }
body { background: var(--bg); display: flex; justify-content: center; align-items: center; }

/* Phone frame for PC display */
.phone-frame {
  width: 390px; height: 844px;
  background: var(--bg);
  border-radius: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,.15), 0 0 0 8px #1a1a2e;
  display: flex; flex-direction: column;
  overflow: hidden; position: relative;
}

/* Header */
.app-header {
  background: linear-gradient(135deg, #a8d8ff 0%, #d4ecff 100%);
  padding: 48px 16px 16px;
  position: relative;
}
.app-header .back-btn {
  position: absolute; top: 48px; left: 12px;
  background: none; border: none; font-size: 20px; color: #333; cursor: pointer;
}
.app-header .title {
  text-align: center; font-size: 17px; font-weight: 600; color: #333;
}
.app-header .subtitle {
  text-align: center; font-size: 12px; color: var(--text-secondary); margin-top: 2px;
}

/* Banner area */
.banner {
  background: linear-gradient(135deg, #a8d8ff 0%, #d4ecff 100%);
  padding: 0 16px 20px;
}
.banner-text {
  color: var(--primary-dark); font-size: 18px; font-weight: 600; line-height: 1.5;
}
.service-card {
  background: #fff; border-radius: 12px; padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-top: 12px;
}
.service-card .avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 18px;
}
.service-card .info { flex: 1; }
.service-card .info .name { font-size: 14px; font-weight: 600; }
.service-card .info .desc { font-size: 12px; color: var(--text-secondary); }
.service-card .arrow { color: #ccc; font-size: 16px; }

/* Chat area */
.chat-area {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
  -webkit-overflow-scrolling: touch;
}

/* Message bubbles */
.msg-row { display: flex; gap: 8px; align-items: flex-start; }
.msg-row.user { flex-direction: row-reverse; }
.msg-bubble {
  max-width: 75%; padding: 12px 14px; border-radius: var(--radius);
  font-size: 14px; line-height: 1.6; word-break: break-word;
}
.msg-bubble.bot {
  background: var(--bot-bubble); color: var(--text);
  border-top-left-radius: 4px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.msg-bubble.user {
  background: var(--user-bubble); color: #fff;
  border-top-right-radius: 4px;
}
.msg-bubble p { margin-bottom: 0.4em; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble pre { background: #f5f5f5; border-radius: 8px; padding: 8px; overflow-x: auto; font-size: 12px; margin: 6px 0; }
.msg-bubble code { font-size: 12px; }

/* Typing indicator */
.typing-dots { display: flex; gap: 4px; padding: 12px 14px; }
.typing-dots span {
  width: 8px; height: 8px; border-radius: 50%; background: #ccc;
  animation: bounce 1.4s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

/* Follow-up bubbles */
.followup-list { display: flex; flex-direction: column; gap: 8px; }
.followup-item {
  background: #fff; border: 1px solid var(--border); border-radius: 20px;
  padding: 10px 16px; font-size: 14px; color: var(--primary-dark);
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: background .2s;
}
.followup-item:active { background: #f0f7ff; }
.followup-item::before { content: "✦"; color: var(--primary); font-size: 12px; }

/* Bottom input */
.input-bar {
  background: #fff; border-top: 1px solid var(--border);
  padding: 10px 12px; display: flex; align-items: center; gap: 8px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom, 0));
}
.input-bar input {
  flex: 1; height: 38px; border: 1px solid #e0e0e0; border-radius: 19px;
  padding: 0 14px; font-size: 14px; outline: none;
  background: #f8f8f8;
}
.input-bar input:focus { border-color: var(--primary); background: #fff; }
.input-bar .send-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--primary); border: none; color: #fff;
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.input-bar .send-btn:disabled { background: #ccc; }

/* Tab bar */
.tab-bar {
  background: #fff; border-top: 1px solid var(--border);
  display: flex; justify-content: space-around;
  padding: 6px 0 calc(6px + env(safe-area-inset-bottom, 0));
}
.tab-item {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  font-size: 10px; color: var(--text-secondary); cursor: pointer;
}
.tab-item.active { color: var(--primary); }
.tab-item .icon { font-size: 20px; }

/* Service chips at bottom */
.service-chips {
  display: flex; gap: 8px; padding: 8px 16px;
  overflow-x: auto; flex-shrink: 0;
}
.service-chip {
  display: flex; align-items: center; gap: 4px;
  background: #fff; border-radius: 16px; padding: 6px 12px;
  font-size: 12px; color: var(--text); white-space: nowrap;
  box-shadow: 0 1px 3px rgba(0,0,0,.06); cursor: pointer;
}
.service-chip .dot { width: 6px; height: 6px; border-radius: 50%; }

/* Debug panel */
.debug-toggle {
  position: absolute; top: 48px; right: 12px;
  background: rgba(0,0,0,.3); border: none; color: #fff;
  font-size: 11px; padding: 4px 8px; border-radius: 10px; cursor: pointer;
  z-index: 100;
}
.debug-panel {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.95); z-index: 200;
  display: none; flex-direction: column;
}
.debug-panel.open { display: flex; }
.debug-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 48px 16px 12px; color: #fff;
}
.debug-header h3 { font-size: 15px; }
.debug-header button { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }
.debug-content {
  flex: 1; overflow-y: auto; padding: 0 12px 12px;
  font-family: "SF Mono", Monaco, monospace; font-size: 11px;
  color: #0f0; line-height: 1.5; white-space: pre-wrap; word-break: break-all;
}
.debug-content .trace-entry { margin-bottom: 6px; border-bottom: 1px solid #333; padding-bottom: 6px; }
.debug-content .trace-time { color: #888; }
.debug-content .trace-type { color: #ff0; }
.debug-content .trace-data { color: #0f0; }

/* Disclaimer */
.disclaimer {
  text-align: center; font-size: 11px; color: #999; padding: 4px;
}
.disclaimer a { color: var(--primary); text-decoration: none; }
</style>
</head>
<body>

<div class="phone-frame" id="app">
  <!-- Debug toggle -->
  <button class="debug-toggle" id="debug-toggle">Trace</button>

  <!-- Debug Panel (hidden by default) -->
  <div class="debug-panel" id="debug-panel">
    <div class="debug-header">
      <h3>Model Trace</h3>
      <button id="debug-close">&times;</button>
    </div>
    <div class="debug-content" id="debug-content"></div>
  </div>

  <!-- Header -->
  <div class="app-header">
    <button class="back-btn">&lt;</button>
    <div class="title">文心健康管家</div>
    <div class="subtitle">内测版 Demo</div>
  </div>

  <!-- Banner -->
  <div class="banner">
    <div class="banner-text">深夜降温了，盖好被子早<br/>点休息</div>
    <div class="service-card">
      <div class="avatar">+</div>
      <div class="info">
        <div class="name">在线问医生</div>
        <div class="desc">真实医生权威解答</div>
      </div>
      <div class="arrow">&gt;</div>
    </div>
  </div>

  <!-- Chat messages -->
  <div class="chat-area" id="chat-area">
    <!-- Initial followup suggestions -->
    <div class="followup-list" id="initial-suggestions">
      <div class="followup-item" onclick="sendFromSuggestion(this)">降温天吃什么最暖身</div>
      <div class="followup-item" onclick="sendFromSuggestion(this)">熬夜后怎么快速回血</div>
      <div class="followup-item" onclick="sendFromSuggestion(this)">为什么总是觉得很累</div>
    </div>
  </div>

  <!-- Disclaimer -->
  <div class="disclaimer">继续沟通代表您已阅读并同意 <a href="#">《服务声明》</a></div>

  <!-- Service chips -->
  <div class="service-chips">
    <div class="service-chip"><span class="dot" style="background:#4facfe"></span> 在线问医生</div>
    <div class="service-chip"><span class="dot" style="background:#ff6b6b"></span> 新年祈福</div>
    <div class="service-chip"><span class="dot" style="background:#ffa940"></span> 每日健康运势</div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <input type="text" id="msg-input" placeholder="发消息或按住说话..." />
    <button class="send-btn" id="send-btn">&#9654;</button>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <div class="tab-item"><span class="icon">&#128196;</span>档案</div>
    <div class="tab-item active"><span class="icon">&#9889;</span>服务</div>
    <div class="tab-item"><span class="icon">&#128100;</span>我的</div>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
let sessionId = null;
let isStreaming = false;
let abortCtrl = null;
let traceLog = [];

// A2UI state
let components = {}, dataModel = {}, rootId = null;

// ─── Debug Panel ────────────────────────────────────────────────────────────
const debugPanel = document.getElementById('debug-panel');
const debugContent = document.getElementById('debug-content');

document.getElementById('debug-toggle').addEventListener('click', () => {
  debugPanel.classList.add('open');
});
document.getElementById('debug-close').addEventListener('click', () => {
  debugPanel.classList.remove('open');
});

function addTrace(type, data) {
  const time = new Date().toLocaleTimeString('zh-CN', {hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit', fractionalSecondDigits:3});
  const entry = document.createElement('div');
  entry.className = 'trace-entry';
  const dataStr = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
  entry.innerHTML = `<span class="trace-time">[${time}]</span> <span class="trace-type">${type}</span>\n<span class="trace-data">${escHtml(dataStr)}</span>`;
  debugContent.appendChild(entry);
  debugContent.scrollTop = debugContent.scrollHeight;
}

// ─── Helpers ────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollChat() {
  const area = document.getElementById('chat-area');
  area.scrollTop = area.scrollHeight;
}

// ─── UI Rendering ───────────────────────────────────────────────────────────
function appendUserMsg(text) {
  const area = document.getElementById('chat-area');
  // Remove initial suggestions
  const sug = document.getElementById('initial-suggestions');
  if (sug) sug.remove();

  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="msg-bubble user">${escHtml(text)}</div>`;
  area.appendChild(row);
  scrollChat();
}

function appendBotMsg(html) {
  const area = document.getElementById('chat-area');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.innerHTML = `<div class="msg-bubble bot">${html}</div>`;
  area.appendChild(row);
  scrollChat();
  return row.querySelector('.msg-bubble');
}

function showTyping() {
  const area = document.getElementById('chat-area');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-indicator';
  row.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
  area.appendChild(row);
  scrollChat();
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ─── Session Management ─────────────────────────────────────────────────────
async function ensureSession() {
  if (sessionId) return;
  const res = await fetch('/sessions', {method: 'POST'});
  const data = await res.json();
  sessionId = data.id;
  addTrace('SESSION', `Created: ${sessionId}`);
}

// ─── A2UI Processing ────────────────────────────────────────────────────────
let currentBotBubble = null;
let accumulatedText = '';

function processA2UIMessage(msg) {
  addTrace('A2UI', msg);

  if (msg.beginRendering) {
    rootId = msg.beginRendering.root;
    components = {};
    dataModel = {};
    return;
  }
  if (msg.surfaceUpdate) {
    for (const c of (msg.surfaceUpdate.components || [])) {
      components[c.id] = c.component;
    }
    return;
  }
  if (msg.dataModelUpdate) {
    for (const dc of (msg.dataModelUpdate.contents || [])) {
      const key = dc.key;
      const value = dc.valueString || '';
      dataModel[key] = value;
      // Find the text component that uses this dataKey and check if it's the bot response
      updateBotBubbleFromData(key, value);
    }
    return;
  }
}

function updateBotBubbleFromData(key, value) {
  // Find any Text component with this dataKey
  for (const [id, comp] of Object.entries(components)) {
    if (comp.Text && comp.Text.dataKey === key) {
      const hint = comp.Text.usageHint || 'body';
      if (hint === 'body') {
        // This is the main response body - update the bot bubble
        if (!currentBotBubble) {
          hideTyping();
          currentBotBubble = appendBotMsg('');
        }
        const html = typeof marked !== 'undefined' ? marked.parse(value) : escHtml(value);
        currentBotBubble.innerHTML = html;
        scrollChat();
      }
    }
  }
}

// ─── SSE Stream ─────────────────────────────────────────────────────────────
async function consumeSSE(res) {
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  try {
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed.startsWith('data:')) {
          const jsonStr = trimmed.slice(5).trimStart();
          if (!jsonStr) continue; // keepalive
          try {
            const msg = JSON.parse(jsonStr);
            if (msg.error) { addTrace('ERROR', msg.error); continue; }
            processA2UIMessage(msg);
          } catch(_) {}
        }
      }
    }
  } catch(err) {
    if (abortCtrl && abortCtrl.signal.aborted) return;
    addTrace('ERROR', err.message);
  }
}

// ─── Send Message ───────────────────────────────────────────────────────────
async function sendMessage(text) {
  if (!text || isStreaming) return;
  await ensureSession();

  appendUserMsg(text);
  showTyping();
  currentBotBubble = null;
  isStreaming = true;
  document.getElementById('send-btn').disabled = true;

  addTrace('SEND', text);

  abortCtrl = new AbortController();
  try {
    const res = await fetch(`/sessions/${sessionId}/chat`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text}),
      signal: abortCtrl.signal,
    });
    if (!res.ok) {
      hideTyping();
      const err = await res.json().catch(() => ({error: res.statusText}));
      appendBotMsg(`<span style="color:red">Error: ${escHtml(err.error||res.statusText)}</span>`);
      addTrace('ERROR', err);
      return;
    }
    await consumeSSE(res);
  } catch(err) {
    if (!abortCtrl.signal.aborted) {
      hideTyping();
      addTrace('ERROR', err.message);
    }
  } finally {
    hideTyping();
    isStreaming = false;
    abortCtrl = null;
    document.getElementById('send-btn').disabled = false;
  }
}

// ─── Event Bindings ─────────────────────────────────────────────────────────
document.getElementById('send-btn').addEventListener('click', () => {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (text) { input.value = ''; sendMessage(text); }
});

document.getElementById('msg-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.isComposing) {
    e.preventDefault();
    const text = e.target.value.trim();
    if (text) { e.target.value = ''; sendMessage(text); }
  }
});

function sendFromSuggestion(el) {
  sendMessage(el.textContent.trim());
}

addTrace('INIT', 'Demo loaded. Click suggestions or type to start.');
</script>
</body>
</html>
