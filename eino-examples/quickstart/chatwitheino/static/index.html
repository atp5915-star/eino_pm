<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>文心健康管家</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #00c8c8;
  --primary-light: #e8fafa;
  --bg: linear-gradient(180deg, #f2f6ff 0%, #e1eaff 100%);
  --card-bg: #fff;
  --text: #000311;
  --text-secondary: #272933;
  --text-tertiary: #848691;
  --border: #e8eef5;
  --user-bubble-bg: #b2eeee;
  --bot-bubble-bg: #ffffff;
  --radius: 16px;
}
html, body { height: 100%; font-family: "PingFang SC", "Droid Sans Fallback", PingFangSC-Regular, -apple-system, BlinkMacSystemFont, Arial, Helvetica, sans-serif; background: #f0f2f5; color: #000311; }
body { display: flex; }

/* Layout: phone + trace side panel */
.layout { display: flex; width: 100%; height: 100%; justify-content: center; }

/* Phone screen - no frame, just H5 page */
.phone-screen {
  width: 420px; min-width: 420px; height: 100%;
  background:
    url('https://med-fe.cdn.bcebos.com/wenzhen-mini-app/aiContainerBg.png') top center / 100% 56% no-repeat,
    var(--bg);
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* Trace side panel */
.trace-panel, .query-panel {
  width: 380px; min-width: 380px; background: #f9fafb; display: none; flex-direction: column;
  border-left: 1px solid #e5e7eb; margin-left: 12px; border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.06); overflow: hidden; height: 100%;
}
.trace-panel.open, .query-panel.open { display: flex; }
.trace-header, .query-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; border-bottom: 1px solid #e5e7eb; background: #fff;
}
.trace-header h3, .query-header h3 { color: #333; font-size: 13px; font-weight: 600; }
.panel-tabs { display: flex; gap: 6px; align-items: center; }
.panel-tab {
  border: 1px solid #e5e7eb; background: #fff; color: #666;
  font-size: 12px; padding: 5px 12px; border-radius: 15px; cursor: pointer;
}
.panel-tab.active { color: #000311; background: #f4fbfb; border-color: #b9eeee; font-weight: 600; }
.trace-header .close-btn, .query-header .close-btn { background: none; border: none; color: #999; font-size: 18px; cursor: pointer; }
.trace-header .close-btn:hover, .query-header .close-btn:hover { color: #333; }
.trace-header .clear-btn { background: none; border: 1px solid #ddd; color: #666; font-size: 11px; padding: 3px 10px; border-radius: 4px; cursor: pointer; }
.trace-header .clear-btn:hover { border-color: #999; color: #333; }
.trace-content {
  flex: 1; overflow-y: auto; padding: 10px 12px;
  font-family: "SF Mono", "Fira Code", Monaco, monospace; font-size: 12px;
  line-height: 1.6;
}
.trace-turn { margin-bottom: 12px; border: 1px solid #e5e7eb; border-radius: 10px; overflow: hidden; background: #f8fafc; }
.trace-turn-header { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 8px 10px; background: #fff; border-bottom: 1px solid #edf0f5; }
.trace-turn-title { color: #111827; font-size: 12px; font-weight: 700; }
.trace-turn-subtitle { color: #6b7280; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }
.trace-turn-copy { border: 1px solid #d7dde6; background: #fff; color: #374151; border-radius: 10px; font-size: 11px; padding: 3px 9px; cursor: pointer; flex-shrink: 0; }
.trace-turn-copy:hover { background: #f3f6fa; }
.trace-turn-copy.copied { color: #fff; background: #00c8c8; border-color: #00c8c8; }
.trace-turn-body { padding: 8px; }
.trace-entry { margin-bottom: 8px; padding: 8px 10px; background: #fff; border-radius: 6px; border-left: 3px solid #ddd; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.trace-entry.type-send { border-left-color: #3b9eff; }
.trace-entry.type-a2ui { border-left-color: #8b5cf6; }
.trace-entry.type-agent { border-left-color: #14b8a6; }
.trace-entry.type-ui_card { border-left-color: #f59e0b; }
.trace-entry.type-error { border-left-color: #ef4444; }
.trace-entry.type-session { border-left-color: #10b981; }
.trace-entry.type-init { border-left-color: #f59e0b; }
.trace-meta { display: flex; justify-content: space-between; margin-bottom: 4px; }
.trace-time { color: #9ca3af; font-size: 11px; }
.trace-type { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.trace-type.send { color: #2563eb; }
.trace-type.a2ui { color: #7c3aed; }
.trace-type.agent { color: #0f766e; }
.trace-type.ui_card { color: #d97706; }
.trace-type.error { color: #dc2626; }
.trace-type.session { color: #059669; }
.trace-type.init { color: #d97706; }
.trace-body { color: #374151; white-space: pre-wrap; word-break: break-all; font-size: 11px; }
.trace-body .key { color: #2563eb; }
.trace-body .str { color: #059669; }
.trace-body .num { color: #d97706; }

.query-content { flex: 1; overflow-y: auto; padding: 12px; }
.query-section { margin-bottom: 14px; }
.query-section-title {
  font-size: 12px; font-weight: 600; color: #6b7280; margin: 4px 0 8px;
  display: flex; align-items: center; gap: 6px;
}
.query-item {
  background: #fff; border: 1px solid #edf0f5; border-radius: 10px;
  padding: 10px 10px; margin-bottom: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.03);
}
.query-text { font-size: 13px; line-height: 19px; color: #111827; margin-bottom: 8px; }
.query-image-count { display: inline-flex; margin-left: 6px; padding: 1px 6px; border-radius: 9px; background: #fff7ed; color: #ea580c; font-size: 10px; }
.query-image-strip { display: flex; gap: 6px; margin: 0 0 8px; overflow-x: auto; padding-bottom: 2px; }
.query-image-thumb { width: 54px; height: 54px; border-radius: 9px; border: 1px solid #e8eef5; object-fit: cover; background: #f8fafc; flex: 0 0 auto; }
.query-meta { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-top: 8px; }
.query-tag { flex: 0 1 auto; min-width: 0; font-size: 11px; color: #00a6a6; background: #e8fafa; border-radius: 10px; padding: 2px 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.query-actions { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-left: auto; flex-shrink: 0; }
.query-copy, .query-send {
  min-width: 50px; border: 1px solid #d7dde6; background: #fff; color: #374151; border-radius: 12px;
  font-size: 11px; line-height: 16px; padding: 4px 10px; cursor: pointer;
}
.query-send { border-color: #b9eeee; color: #008f8f; background: #f3ffff; }
.query-copy:hover, .query-send:hover { background: #f3f6fa; }
.query-send:hover { background: #e8fafa; }
.query-copy.copied { color: #fff; background: #00c8c8; border-color: #00c8c8; }

/* Header */
.app-header {
  background: transparent;
  padding: 14px 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.app-header .left { display: flex; align-items: center; gap: 12px; }
.app-header .back-btn { background: none; border: none; font-size: 18px; color: #333; cursor: pointer; }
.app-header .title-group { }
.app-header .title { font-size: 18.7px; font-weight: 500; color: #000311; line-height: 18.7px; }
.app-header .subtitle { font-size: 11px; font-weight: 400; color: #888; margin-top: 3px; }
.app-header .icon-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(255,255,255,.5); border: none; color: #000311;
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; line-height: 1;
  transition: background .15s;
}
.app-header .icon-btn:hover { background: rgba(255,255,255,.8); }
.app-header .right-actions { display: flex; gap: 8px; align-items: center; }

/* External dev toggles (outside phone) */
.dev-toggle-group {
  position: absolute; top: 16px; left: calc(50% + 220px);
  display: flex; gap: 8px;
}
.external-trace-btn, .external-query-btn {
  background: #fff; border: 1px solid #e5e7eb; color: #333;
  font-size: 12px; padding: 6px 14px; border-radius: 16px; cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.external-trace-btn:hover, .external-query-btn:hover { background: #f5f6fa; }
.external-trace-btn.hidden, .external-query-btn.hidden { display: none; }

/* Banner */
.banner {
  background: transparent;
  padding: 4px 4px 16px;
  flex-shrink: 0;
}
.banner-text {
  color: #000311; font-size: 18.7px; font-weight: 500;
  line-height: 29px; letter-spacing: 0.5px;
}
.service-card {
  background: #fff; border-radius: 14px; padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.04); margin-top: 14px;
}
.service-card .avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, #3b9eff, #00c6ff);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 20px; font-weight: 700;
}
.service-card .info { flex: 1; }
.service-card .info .name { font-size: 16.6px; font-weight: 500; color: #000311; line-height: 1.2; }
.service-card .info .desc { font-size: 12.5px; font-weight: 400; color: #999; margin-top: 4px; }
.service-card .arrow { color: #ccc; font-size: 18px; }

/* Chat area */
.chat-area {
  flex: 1; overflow-y: auto; padding: 16px 16px;
  display: flex; flex-direction: column; gap: 14px;
  -webkit-overflow-scrolling: touch;
}

/* Messages */
.msg-row { display: flex; align-items: flex-start; }
.msg-row.user { justify-content: flex-end; }
.msg-bubble {
  max-width: 78%; padding: 12px 16px; font-size: 17.7px; font-weight: 400;
  line-height: 30px; letter-spacing: 0.5px; word-break: break-word; color: #000311;
}
.msg-bubble.bot { max-width: 100%; flex: 1; }
.msg-bubble.bot {
  background: var(--bot-bubble-bg); color: #000311; border-radius: 4px 16px 16px 16px;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.msg-bubble.user {
  background: var(--user-bubble-bg); color: #000311; border-radius: 16px 4px 16px 16px;
}
.msg-bubble.bot {
  font-size: 16.5px; line-height: 1.78; letter-spacing: .2px; overflow: hidden;
}
.msg-bubble.bot > :first-child { margin-top: 0; }
.msg-bubble.bot > :last-child { margin-bottom: 0; }
.msg-bubble p { margin: 8px 0 12px; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble strong { font-weight: 800; color: #000311; }
.msg-bubble em { font-style: italic; }
.msg-bubble del { color: #4b5563; text-decoration-thickness: 1.5px; text-decoration-color: #111827; }
.msg-bubble u { font-weight: 800; color: #000311; text-decoration-color: rgba(24, 199, 199, .28); text-decoration-thickness: 6px; text-underline-offset: -2px; }
.msg-bubble h1, .msg-bubble h2, .msg-bubble h3, .msg-bubble h4, .msg-bubble h5, .msg-bubble h6 {
  position: relative; margin: 20px 0 12px; padding-left: 14px; color: #000311; font-weight: 800; letter-spacing: 0; line-height: 1.42; word-break: break-word;
}
.msg-bubble h1::before, .msg-bubble h2::before, .msg-bubble h3::before, .msg-bubble h4::before, .msg-bubble h5::before, .msg-bubble h6::before {
  content: ''; position: absolute; left: 0; top: .68em; transform: translateY(-50%); width: 4px; height: 1.05em; border-radius: 4px; background: #18d5d5;
}
.msg-bubble h1 { font-size: 23px; }
.msg-bubble h2 { font-size: 21px; }
.msg-bubble h3 { font-size: 19px; }
.msg-bubble h4 { font-size: 18px; }
.msg-bubble h5 { font-size: 17px; }
.msg-bubble h6 { font-size: 16px; }
.msg-bubble .long-heading-fallback { margin: 8px 0 12px; font-size: inherit; line-height: inherit; }
.msg-bubble hr { border: 0; border-top: 1px solid #edf0f5; margin: 18px 0; }
.msg-bubble ul, .msg-bubble ol { margin: 10px 0 14px; padding-left: 0; list-style: none; }
.msg-bubble li { position: relative; margin: 8px 0; padding-left: 30px; }
.msg-bubble li > ul, .msg-bubble li > ol { margin: 8px 0 4px; }
.msg-bubble ul > li::before {
  content: ''; position: absolute; left: 2px; top: .89em; transform: translateY(-50%); width: 7px; height: 7px; border: 2px solid #18c7c7; border-radius: 50%; background: #fff;
}
.msg-bubble ul ul > li::before { width: 5px; height: 5px; border-width: 0; background: #111827; }
.msg-bubble ol { counter-reset: item; }
.msg-bubble ol > li { counter-increment: item; }
.msg-bubble ol > li::before {
  content: counter(item); position: absolute; left: 0; top: .98em; transform: translateY(-50%); width: 22px; height: 22px; padding: 0; border-radius: 7px;
  display: inline-flex; align-items: center; justify-content: center;
  background: #18c7c7; color: #fff; font-size: 12px; font-weight: 800; line-height: 1; text-align: center;
}
.msg-bubble input[type="checkbox"] { margin: 0 8px 0 -2px; accent-color: #18c7c7; transform: scale(1.05); }
.msg-bubble blockquote { margin: 12px 0; padding: 2px 0 2px 14px; border-left: 3px solid #e4e8ef; color: #767b86; }
.msg-bubble blockquote p { margin: 8px 0; }
.msg-bubble a { color: #138dcc; text-decoration: none; border-bottom: 1px solid rgba(19,141,204,.25); }
.msg-bubble code {
  padding: 2px 5px; border-radius: 5px; background: #f7f3f8; color: #b12bb8;
  font-family: "SF Mono", Menlo, Consolas, monospace; font-size: .9em; font-style: italic;
}
.msg-bubble pre { margin: 12px 0; padding: 12px; border-radius: 12px; background: #f7f9fc; overflow-x: auto; border: 1px solid #edf0f5; }
.msg-bubble pre code { display: block; padding: 0; background: transparent; color: #243044; font-size: 12.5px; line-height: 1.7; font-style: normal; }
.msg-bubble .table-scroll { width: 100%; overflow-x: auto; margin: 12px 0; border: 1px solid #edf0f5; border-radius: 12px; }
.msg-bubble table {
  width: 100%; min-width: 100%; border-collapse: separate; border-spacing: 0;
  font-size: 13.5px; line-height: 20px; table-layout: auto;
}
.msg-bubble th, .msg-bubble td {
  padding: 9px 10px; vertical-align: top; text-align: left; white-space: nowrap;
  border-right: 1px solid #edf0f5; border-bottom: 1px solid #edf0f5;
}
.msg-bubble th:last-child, .msg-bubble td:last-child { border-right: none; }
.msg-bubble tr:last-child td { border-bottom: none; }
.msg-bubble th { background: #f5fbff; font-weight: 700; color: #000311; }
.msg-bubble td { background: #fff; color: #252833; }
.msg-bubble img { display: block; max-width: 100%; max-height: 220px; object-fit: contain; margin: 10px 0; border-radius: 12px; background: #f8fafc; border: 1px solid #edf0f5; }
.msg-bubble .image-group { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin: 10px 0; }
.msg-bubble .image-group img { width: 100%; height: 110px; margin: 0; object-fit: cover; }
.msg-bubble .image-group.collapsed img:nth-child(n+3) { display: none; }
.msg-bubble .image-more { grid-column: 1 / -1; border: 1px dashed #cfd8e3; border-radius: 10px; color: #667085; background: #f8fafc; padding: 7px 10px; font-size: 13px; text-align: center; }

/* Medical service big card */
.medical-card {
  margin-top: 12px; padding: 14px 0 4px; background: #fff; border-radius: 18px;
  color: #000311; overflow: hidden;
}
.medical-card .medical-intro {
  padding: 0 2px 14px; font-size: 17px; line-height: 30px; letter-spacing: .3px;
}
.medical-card .medical-intro strong { font-weight: 700; }
.medical-card .medical-cert {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2px 12px; border-bottom: 1px solid #eef1f5;
  font-size: 13px; color: #848691;
}
.medical-card .medical-cert .cert-left { display: flex; align-items: center; gap: 6px; color: #272933; font-weight: 500; }
.medical-card .section-title {
  margin: 16px 0 12px; padding-left: 12px; border-left: 4px solid #18d5d5;
  font-size: 18px; font-weight: 700; line-height: 24px;
}
.medical-card .medical-list { display: flex; flex-direction: column; }
.medical-card .medical-item {
  display: flex; gap: 12px; padding: 14px 2px; border-bottom: 1px solid #eef1f5;
}
.medical-card .medical-item:last-child { border-bottom: none; }
.medical-card .item-main { flex: 1; min-width: 0; }
.medical-card .item-title { font-size: 16px; font-weight: 700; line-height: 22px; color: #000311; }
.medical-card .item-title .muted { margin-left: 6px; font-size: 13px; font-weight: 400; color: #848691; }
.medical-card .item-sub { margin-top: 4px; font-size: 13px; line-height: 18px; color: #4b5563; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.medical-card .item-tags { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
.medical-card .tag { padding: 1px 5px; border-radius: 4px; font-size: 11px; line-height: 16px; color: #8b5a20; background: #fff2d8; }
.medical-card .tag.green { color: #21a66b; background: #e9f8f1; }
.medical-card .tag.red { color: #ef4444; background: #fff0f0; }
.medical-card .item-meta { margin-top: 6px; font-size: 12px; line-height: 18px; color: #848691; }
.medical-card .item-meta strong { color: #00bfbf; font-weight: 600; }
.medical-card .item-right { width: 76px; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
.medical-card .price { font-size: 17px; font-weight: 700; color: #ef4444; line-height: 20px; }
.medical-card .price small { font-size: 11px; color: #b9bdc6; font-weight: 400; }
.medical-card .buy-btn {
  min-width: 68px; height: 34px; padding: 0 12px; border-radius: 17px; border: none;
  background: linear-gradient(to right, #00CFA3, #00D3EA); color: #fff;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
.medical-card .avatar, .medical-card .logo, .medical-card .product-img {
  width: 54px; height: 54px; flex-shrink: 0; border-radius: 50%; background: #e9f8ff;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  color: #00a6a6; font-size: 18px; font-weight: 700;
}
.medical-card .avatar img, .medical-card .logo img, .medical-card .product-img img { width: 100%; height: 100%; object-fit: cover; }
.medical-card .logo { border-radius: 12px; background: #f7f8fb; color: #9b1c1c; font-size: 12px; text-align: center; }
.medical-card .product-img { width: 112px; height: 92px; border-radius: 10px; background: linear-gradient(135deg, #dcfff6, #f4fff0); color: #00a67d; font-size: 14px; }
.medical-card .product-row .item-title { font-size: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; white-space: normal; overflow: hidden; }
.medical-card .plan-row { padding: 12px 2px; }
.medical-card .plan-row .item-main { display: flex; flex-direction: column; gap: 3px; }
.medical-card .free-badge { display: inline-block; margin-left: 6px; padding: 1px 5px; border-radius: 4px; background: #6b4a38; color: #fff; font-size: 11px; }
.medical-card .hospital-actions { display: flex; gap: 10px; margin-top: 12px; }
.medical-card .hospital-actions .buy-btn { flex: 1; background: #e5fbf8; color: #000311; }
.medical-card .more-link { text-align: center; padding: 12px 0 4px; color: #9aa0a6; font-size: 14px; }
.medical-card .medical-tip {
  margin-top: 14px; padding: 10px; border-radius: 8px; background: #f1f3f7;
  color: #9aa0a6; font-size: 12px; text-align: center;
}

/* Service mount card */
.service-mount-card {
  width: 100%; margin-top: 18px; padding: 12px;
  background: #f1faff; border: none; border-radius: 12px;
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  transition: transform .15s ease, background .15s ease;
}
.service-mount-card:active { transform: scale(.98); background: #eaf8ff; }
.service-mount-card .service-icon {
  width: 54px; height: 54px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #e7fbff 0%, #d5f2ff 100%);
  box-shadow: 0 4px 12px rgba(0,200,200,.12); overflow: hidden;
}
.service-mount-card .service-icon svg { width: 34px; height: 34px; }
.service-mount-card .service-info { flex: 1; min-width: 0; }
.service-mount-card .service-title {
  font-size: 17px; font-weight: 600; line-height: 22px; color: #000311;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.service-mount-card .service-desc {
  margin-top: 4px; font-size: 13px; font-weight: 400; line-height: 18px; color: #848691;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.service-mount-card .service-action {
  flex-shrink: 0; min-width: 76px; height: 38px; border: none; border-radius: 19px;

<script>
// ─── State ──────────────────────────────────────────────────────────────────
let sessionId = null;
let isStreaming = false;
let abortCtrl = null;

// A2UI state
let components = {}, dataModel = {}, rootId = null;

// ─── Trace Panel ────────────────────────────────────────────────────────────
const tracePanel = document.getElementById('trace-panel');
const traceContent = document.getElementById('trace-content');
const queryPanel = document.getElementById('query-panel');
const queryContent = document.getElementById('query-content');

function openSidePanel(panelName) {
  const isTrace = panelName === 'trace';
  tracePanel.classList.toggle('open', isTrace);
  queryPanel.classList.toggle('open', !isTrace);
  document.getElementById('dev-toggle').classList.add('hidden');
}

function closeDevPanel() {
  tracePanel.classList.remove('open');
  queryPanel.classList.remove('open');
  document.getElementById('dev-toggle').classList.remove('hidden');
}

document.getElementById('dev-toggle').addEventListener('click', () => openSidePanel('query'));
document.getElementById('trace-close').addEventListener('click', closeDevPanel);
document.getElementById('query-close').addEventListener('click', closeDevPanel);
document.querySelectorAll('[data-panel-tab]').forEach(btn => {
  btn.addEventListener('click', () => openSidePanel(btn.dataset.panelTab));
});
let traceTurnSeq = 0;
let currentTraceTurn = null;
let currentTraceCardSignatures = new Set();

const rootTraceTurn = createTraceTurn('系统初始化', '页面加载 / 会话创建');
currentTraceTurn = rootTraceTurn;

document.getElementById('trace-clear').addEventListener('click', () => {
  traceContent.innerHTML = '';
  traceTurnSeq = 0;
  currentTraceTurn = createTraceTurn('系统初始化', '清空后新日志');
});

function createTraceTurn(title, subtitle) {
  const turn = {
    id: ++traceTurnSeq,
    title,
    subtitle,
    entries: [],
    container: document.createElement('div'),
    body: document.createElement('div'),
  };
  turn.container.className = 'trace-turn';
  turn.body.className = 'trace-turn-body';
  turn.container.innerHTML = `<div class="trace-turn-header"><div><div class="trace-turn-title">${esc(title)}</div><div class="trace-turn-subtitle">${esc(subtitle || '')}</div></div><button class="trace-turn-copy" type="button">Copy</button></div>`;
  turn.container.appendChild(turn.body);
  turn.container.querySelector('.trace-turn-copy').addEventListener('click', (event) => copyTraceTurn(turn, event.currentTarget));
  traceContent.appendChild(turn.container);
  return turn;
}

function beginTraceTurn(query) {
  currentTraceTurn = createTraceTurn(`第 ${traceTurnSeq + 1} 轮对话`, query);
  currentTraceCardSignatures = new Set();
}

async function copyTraceTurn(turn, btn) {
  const text = turn.entries.map(e => `[${e.time}] ${e.type}\n${e.text}`).join('\n\n');
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1200);
  } catch (_) {
    btn.textContent = 'Failed';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1200);
  }
}

function compactTraceData(data) {
  if (!data || typeof data !== 'object') return data;
  if (Array.isArray(data)) return data.map(compactTraceData);
  const out = {};
  for (const [key, value] of Object.entries(data)) {
    if (key === 'images' && Array.isArray(value)) {
      out[key] = value.map((image, index) => {
        const size = typeof image === 'string' ? image.length : 0;
        if (typeof image === 'string' && image.startsWith('data:image/')) {
          const mime = image.slice(5, image.indexOf(';')) || 'image';
          return `[${mime} base64 #${index + 1}, ${Math.round(size / 1024)}KB]`;
        }
        return image;
      });
    } else {
      out[key] = compactTraceData(value);
    }
  }
  return out;
}

function addTrace(type, data) {
  if (!currentTraceTurn) currentTraceTurn = createTraceTurn('系统日志', '未归属轮次');
  const time = new Date().toLocaleTimeString('zh-CN', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'});
  const ms = String(Date.now() % 1000).padStart(3, '0');
  const entry = document.createElement('div');
  entry.className = `trace-entry type-${type.toLowerCase()}`;

  let body = '';
  let rawText = '';
  if (typeof data === 'string') {
    rawText = data;
    body = esc(data);
  } else {
    const traceData = compactTraceData(data);
    rawText = JSON.stringify(traceData, null, 2);
    body = formatJSON(traceData);
  }

  entry.innerHTML = `<div class="trace-meta"><span class="trace-type ${type.toLowerCase()}">${type}</span><span class="trace-time">${time}.${ms}</span></div><div class="trace-body">${body}</div>`;
  currentTraceTurn.entries.push({type, time: `${time}.${ms}`, text: rawText});
  currentTraceTurn.body.appendChild(entry);
  traceContent.scrollTop = traceContent.scrollHeight;
}

function formatJSON(obj) {
  let str = esc(JSON.stringify(obj, null, 2));
  return str.replace(/"([^"]+)":/g, '<span class="key">"$1"</span>:')
    .replace(/: "([^"]*)"/g, ': <span class="str">"$1"</span>')
    .replace(/: (\d+)/g, ': <span class="num">$1</span>');
}

// ─── Recommended Queries ────────────────────────────────────────────────────
const DEFAULT_REPORT_SAMPLE_IMAGES = [
  '/assets/report-samples/report-sample-1.jpg',
  '/assets/report-samples/report-sample-2.jpg',
  '/assets/report-samples/report-sample-3.jpeg',
];

function loadReportSampleImages() {
  try {
    const raw = localStorage.getItem('reportSampleImages');
    const images = raw ? JSON.parse(raw) : [];
    return Array.isArray(images) && images.length ? images.filter(Boolean) : DEFAULT_REPORT_SAMPLE_IMAGES;
  } catch (_) {
    return DEFAULT_REPORT_SAMPLE_IMAGES;
  }
}

const REPORT_SAMPLE_IMAGES = loadReportSampleImages().slice(0, 5);

function renderRecommendedQueries() {
  const groups = new Map();
  RECOMMENDED_QUERIES.forEach(item => {
    if (!groups.has(item.group)) groups.set(item.group, []);
    groups.get(item.group).push(item);
  });
  queryContent.innerHTML = Array.from(groups.entries()).map(([group, items]) => `<div class="query-section">
    <div class="query-section-title">${esc(group)}</div>
    ${items.map(item => {
      const index = RECOMMENDED_QUERIES.indexOf(item);
      const hasImages = item.images && item.images.length;
      const imageStrip = hasImages ? `<div class="query-image-strip">${item.images.map(url => `<img class="query-image-thumb" src="${attrEsc(url)}" loading="lazy"/>`).join('')}</div>` : '';
      return `<div class="query-item">
        <div class="query-text">${esc(item.text)}${hasImages ? `<span class="query-image-count">附 ${item.images.length} 张图</span>` : ''}</div>
        ${imageStrip}
        <div class="query-meta"><span class="query-tag">${esc(item.tag)}</span><div class="query-actions"><button class="query-copy" data-query="${attrEsc(item.text)}" onclick="copyRecommendedQuery(this)">复制</button><button class="query-send" data-index="${index}" onclick="sendRecommendedQuery(this)">${hasImages ? '发送+图片' : '发送'}</button></div></div>
      </div>`;
    }).join('')}
  </div>`).join('');
}

async function copyRecommendedQuery(btn) {
  const query = btn.dataset.query || '';
  try {
    await navigator.clipboard.writeText(query);
  } catch (_) {
    const input = document.getElementById('msg-input');
    input.value = query;
    input.select();
    document.execCommand('copy');
  }
  btn.textContent = '已复制';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1200);
}

function sendRecommendedQuery(btn) {
  const item = RECOMMENDED_QUERIES[Number(btn.dataset.index)];
  if (!item) return;
  sendMessageWithImages(item.text, (item.images || []).slice(0, 5));
}

function chooseMedicalCardType(text) {
  const value = String(text || '');
  if (/在线问医生|免费咨询|真人咨询|问医生/.test(value)) return 'doctor';
  if (/肠胃专家|精准找医生|找医生|咨询.*专家|专家/.test(value)) return 'preciseDoctor';
  if (/买.*药|购买.*药|感冒颗粒|感冒胶囊|药品|去购买/.test(value)) return 'drugList';
  if (/医院|挂号|预约|治疗.*医院|找医院/.test(value)) return 'hospital';
  return '';
}

  const data = MEDICAL_MOCK[type];
  if (!data) return '';
  if (type === 'drugList') return renderDrugMedicalCard(data);

    <div class="medical-intro">${data.intro}</div>
    ${data.certRight ? `<div class="medical-cert"><span class="cert-left">🛡️ 卫健委认证医疗机构</span><span>${esc(data.certRight)}</span></div>` : ''}

  </div>`;
}

function extractInlineQuickTests(text) {
  const cards = [];
  const quickRe = /<快捷回复>\s*([\s\S]*?)\s*<\/快捷回复>/g;
  const imageRe = /<图片收集>\s*([\s\S]*?)\s*<\/图片收集>/g;
  let match;
  while ((match = quickRe.exec(text))) {
    const card = parseQuickReplyTag(match[1]);
    if (card) cards.push(card);
  }
  const imageMatch = imageRe.exec(text);
  const imagePrompt = imageMatch ? imageMatch[1].trim() : '';
  if (imagePrompt) {
    if (cards.length) {
      cards[cards.length - 1].imagePrompt = imagePrompt;
      cards[cards.length - 1].inputOption = true;
    } else {
      cards.push({ title: '补充图片信息', selectType: 'single', options: [], imagePrompt, inputOption: true });
    }
  }
  return { text: text.replace(quickRe, '').replace(imageRe, '').trim(), cards };
}

function parseQuickReplyTag(raw) {
  let value = String(raw || '').trim();
  const selectType = value.includes('[多选]') ? 'multiple' : 'single';
  value = value.replace(/\[单选\]|\[多选\]/g, '').trim();
  const parts = value.split(/[:：]/);
  const title = (parts.shift() || '').trim();
  if (!title) return null;
  const optionText = parts.join('：').trim();
  const options = optionText ? optionText.split('|').map(item => item.trim()).filter(Boolean) : [];
  return { title, selectType, options, inputOption: true };
}

// ─── A2UI ───────────────────────────────────────────────────────────────────
let currentBotBubble = null;
let prevDataModel = {};
let tokenCount = 0;
let streamStartTime = 0;

function processA2UIMessage(msg) {
  if (msg.quickTest) {
    addTrace('A2UI', { quickTest: msg.quickTest });
    appendQuickTestCard(msg.quickTest);
    return;
  }
  if (msg.agentTrace) {
    addTrace('AGENT', msg.agentTrace);
    return;
  }
  if (msg.beginRendering) {
    tokenCount = 0;
    streamStartTime = Date.now();
    prevDataModel = {};
    addTrace('A2UI', 'Stream started');
    rootId = msg.beginRendering.root;
    components = {}; dataModel = {};
    return;
  }
  if (msg.surfaceUpdate) {
    const count = (msg.surfaceUpdate.components || []).length;
    if (Object.keys(components).length === 0) {
      addTrace('A2UI', `Component tree: ${count} nodes`);
    }
    for (const c of (msg.surfaceUpdate.components || [])) {
      components[c.id] = c.component;
    }
    return;
  }
  if (msg.dataModelUpdate) {
    for (const dc of (msg.dataModelUpdate.contents || [])) {
      const key = dc.key;
      const newVal = dc.valueString || '';
      const oldVal = prevDataModel[key] || '';
      const delta = newVal.slice(oldVal.length);
      if (delta) tokenCount++;
      prevDataModel[key] = newVal;
      dataModel[key] = newVal;
      updateBotBubble(key, newVal);
    }
    return;
  }
  addTrace('A2UI', msg);
}

function normalizeMarkdown(text) {
  return (text || '')
    .replace(/\*\*\s*\*\*/g, '')
    .replace(/\*\*\s+([^*\n][^\n]*?\S)\s+\*\*/g, '**$1**')
    .replace(/\*\*([^*\n][^\n]*?\S)\s+\*\*/g, '**$1**')
    .replace(/\*\*\s+([^*\n][^\n]*?\S)\*\*/g, '**$1**');
}

function renderMarkdown(text) {
  if (typeof marked === 'undefined') return esc(text);
  marked.setOptions({ gfm: true, breaks: true, mangle: false, headerIds: false });
  return marked.parse(normalizeMarkdown(text));
}

function enhanceBotMarkdown(root) {
  if (!root) return;
  root.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(heading => {
    const text = heading.textContent.trim();
    if (text.length <= 24 && !/[，。；：,.;]/.test(text)) return;
    const paragraph = document.createElement('p');
    paragraph.className = 'long-heading-fallback';
    paragraph.innerHTML = heading.innerHTML;
    heading.replaceWith(paragraph);
  });

  root.querySelectorAll('table').forEach(table => {
    if (table.parentElement && table.parentElement.classList.contains('table-scroll')) return;
    const wrapper = document.createElement('div');
    wrapper.className = 'table-scroll';
    table.parentNode.insertBefore(wrapper, table);
    wrapper.appendChild(table);
  });

  const images = Array.from(root.querySelectorAll('p > img:only-child'));
  let group = [];
  const flushGroup = () => {
    if (group.length <= 1) { group = []; return; }
    const wrapper = document.createElement('div');
    wrapper.className = `image-group${group.length >= 3 ? ' collapsed' : ''}`;
    const firstParent = group[0].parentElement;
    firstParent.parentNode.insertBefore(wrapper, firstParent);
    group.forEach(img => {
      const parent = img.parentElement;
      wrapper.appendChild(img);
      if (parent && parent.childNodes.length === 0) parent.remove();
    });
    if (group.length >= 3) {
      const more = document.createElement('button');
      more.type = 'button';
      more.className = 'image-more';
      more.textContent = `展开全部 ${group.length} 张图片`;
      more.addEventListener('click', () => {
        wrapper.classList.remove('collapsed');
        more.remove();
      });
      wrapper.appendChild(more);
    }
    group = [];
  };

  images.forEach(img => {
    const parent = img.parentElement;
    const previous = group[group.length - 1];
    const isAdjacent = !previous || previous.parentElement.closest('p').nextElementSibling === parent;
    if (!isAdjacent) flushGroup();
    group.push(img);
  });
  flushGroup();

  if (typeof renderMathInElement === 'function') {
    renderMathInElement(root, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false },
      ],
      throwOnError: false,
    });
  }
}

function updateBotBubble(key, value) {
  for (const [id, comp] of Object.entries(components)) {
    if (comp.Text && comp.Text.dataKey === key && (comp.Text.usageHint || 'body') === 'body') {
      if (!currentBotBubble) {
        hideTyping();
        currentBotBubble = appendBotMsg('');
      }
      const cardParsed = extractCardBlocks(value);
      const parsed = extractInlineQuickTests(cardParsed.text);
      const markdownHtml = renderMarkdown(parsed.text);
      const cardHtml = cardParsed.cards.map(renderSkillCard).join('');
      currentBotBubble.innerHTML = markdownHtml + cardHtml;
      enhanceBotMarkdown(currentBotBubble);
      renderInlineQuickTests(key, parsed.cards);
      scrollChat();
    }
  }
}

// ─── SSE ────────────────────────────────────────────────────────────────────
async function consumeSSE(res) {
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  try {
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed.startsWith('data:')) {
          const jsonStr = trimmed.slice(5).trimStart();
          if (!jsonStr) continue;
          try {
            const msg = JSON.parse(jsonStr);
            if (msg.error) { addTrace('ERROR', msg.error); continue; }
            processA2UIMessage(msg);
          } catch(_) {}
        }
      }
    }
  } catch(err) {
    if (abortCtrl && abortCtrl.signal.aborted) return;
    addTrace('ERROR', err.message);
  }
}

// ─── Send ───────────────────────────────────────────────────────────────────
async function sendMessage(text) {
  return sendMessageWithImages(text, []);
}

async function sendMessageWithImages(text, images = []) {
  if ((!text && !images.length) || isStreaming) return;
  await ensureSession();
  appendUserMsg(text, images);
  showTyping();
  currentBotBubble = null;
  isStreaming = true;
  document.getElementById('send-btn').disabled = true;
  beginTraceTurn(text || (images.length ? `图片消息（${images.length}张）` : ''));
  addTrace('SEND', images.length ? { text, images } : text);

  abortCtrl = new AbortController();
  try {
    const res = await fetch(`/sessions/${sessionId}/chat`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, images}),
      signal: abortCtrl.signal,
    });
    if (!res.ok) {
      hideTyping();
      const err = await res.json().catch(() => ({error: res.statusText}));
      appendBotMsg(`<span style="color:#f44">Error: ${esc(err.error||res.statusText)}</span>`);
      addTrace('ERROR', err);
      return;
    }
    await consumeSSE(res);
    if (currentBotBubble && /<table/i.test(currentBotBubble.innerHTML)) {
      currentBotBubble.style.maxWidth = '100%';
    }
    if (currentBotBubble && currentBotBubble.textContent.trim()) {
      enrichBotBubble(currentBotBubble, text);
    }
    if (tokenCount > 0) {
      const elapsed = ((Date.now() - streamStartTime) / 1000).toFixed(1);
      addTrace('SEND', `Done: ${tokenCount} tokens in ${elapsed}s (${(tokenCount / elapsed).toFixed(0)} tok/s)`);
    }
  } catch(err) {
    if (!abortCtrl.signal.aborted) { hideTyping(); addTrace('ERROR', err.message); }
  } finally {
    hideTyping();
    isStreaming = false;
    abortCtrl = null;
    document.getElementById('send-btn').disabled = false;
  }
}

// ─── Events ─────────────────────────────────────────────────────────────────
async function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function flushSend() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text && !pendingImages.length) return;
  const images = await Promise.all(pendingImages.map(img => fileToDataURL(img.file)));
  pendingImages.forEach(img => URL.revokeObjectURL(img.url));
  pendingImages = [];
  renderPreviews();
  input.value = '';
  await sendMessageWithImages(text, images);
}

document.getElementById('send-btn').addEventListener('click', flushSend);
document.getElementById('msg-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.isComposing) {
    e.preventDefault();
    flushSend();
  }
});
function sendFromSuggestion(el) { sendMessage(el.textContent.trim()); }

// ─── Image upload ───────────────────────────────────────────────────────────
let pendingImages = []; // [{url, file}]
const imageInput = document.getElementById('image-input');
const imageBtn = document.getElementById('image-btn');
const previewBar = document.getElementById('image-preview-bar');

imageBtn.addEventListener('click', () => imageInput.click());

imageInput.addEventListener('change', (e) => {
  const files = Array.from(e.target.files || []);
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    if (pendingImages.length >= 5) {
      addTrace('ERROR', '一次对话最多只能上传 5 张图片');
      break;
    }
    const url = URL.createObjectURL(file);
    pendingImages.push({url, file});
  }
  imageInput.value = '';
  renderPreviews();
});

function renderPreviews() {
  previewBar.innerHTML = '';
  if (pendingImages.length === 0) {
    previewBar.classList.remove('show');
    return;
  }
  previewBar.classList.add('show');
  pendingImages.forEach((img, idx) => {
    const item = document.createElement('div');
    item.className = 'image-preview-item';
    item.innerHTML = `<img src="${img.url}"/><button class="remove-btn" data-idx="${idx}">&times;</button>`;
    previewBar.appendChild(item);
  });
  previewBar.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.idx);
      URL.revokeObjectURL(pendingImages[idx].url);
      pendingImages.splice(idx, 1);
      renderPreviews();
    });
  });
}

renderRecommendedQueries();
addTrace('INIT', 'Demo loaded. Ready to chat.');
</script>
