short_description: 中医调理、体质辨识、辨证建议、中成药/食疗/穴位专项 Skill。
description: >-
  当用户明确询问中医调理、体质辨识、症状辨证、中成药、食疗、穴位、艾灸、舌象或作息调理时触发。
  强需求直接回答；中相关性命中时，以服务卡承接体质测评、中医问诊或调理方案服务。
capabilities:
  - 中医体质和证型方向判断
  - 中成药、食疗、茶饮、穴位和生活调理建议
  - 舌象和慢性困扰的中医方向解释
  - 中医问诊和调理服务承接

routing:
  direct_answer:
    enabled: true
    priority: 80
    description: 用户明确表达中医调理、辨证、体质、中成药、舌象或食疗穴位诉求时直接回答。
    query_intents:
      - 中医体质、气血、脾胃、湿气、肝郁、肾虚、上火等咨询
      - 中成药、食疗、茶饮、穴位、艾灸、作息调理咨询
      - 舌象或慢性症状的中医方向判断
    examples:
      - 我是不是湿气重？怎么调理？
      - 舌苔厚白，中医怎么看？
      - 这个中成药适合我吗？
  service_card:
    enabled: true
    priority: 55
    description: 普通健康回答后，用户可能需要中医调理作为补充服务时出卡。
    query_intents:
      - 慢性疲劳、睡眠、胃肠、月经等问题适合中医调理承接
      - 需要体质测评或中医问诊服务
    examples:
      - 想从中医角度调一下
      - 能做个体质测评吗？

demand_scenarios:
  strong:
    - 明确中医调理、辨证、体质、舌象、中成药、食疗穴位等诉求。
  medium:
    - 慢性问题主回答后，中医调理可作为辅助承接。
  weak:
    - 急症、感染、异常出血、快速加重等应优先现代医学就医处理。

