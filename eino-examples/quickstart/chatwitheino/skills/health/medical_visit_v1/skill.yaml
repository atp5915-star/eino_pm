status: draft

short_description: 要不要就医、挂什么科、急诊/门诊和检查路径专项 Skill。
description: >-
  当用户明确询问是否需要就医、挂什么科、急诊还是门诊、先做什么检查、就医前准备或转诊路径时触发。
  强需求直接回答；中相关性命中时，以服务卡承接挂号、问诊、检查准备或就医路径服务。
capabilities:
  - 就医必要性与紧急程度判断
  - 科室分流和挂号路径建议
  - 急诊红线与门诊优先级判断
  - 检查准备和复诊/转诊路径规划

routing:
  direct_answer:
    enabled: true
    priority: 84
    description: 用户明确询问要不要去医院、挂什么科、急诊还是门诊、检查路径时直接回答。
    query_intents:
      - 要不要就医、急不急、是否去急诊
      - 挂什么科、哪个科更合适
      - 先做什么检查、就医前准备什么资料
      - 多科室之间分流和复诊/转诊路径
    examples:
      - 胸口疼要不要去急诊？
      - 这个情况挂什么科？
      - 去医院前需要先做什么检查？
  service_card:
    enabled: true
    priority: 70
    description: 主回答后自然需要挂号、医生问诊、检查准备或就医路径承接时出卡。
    query_intents:
      - 疾病/症状回答后需要挂号或问诊服务
      - 需要根据城市、医院、科室偏好继续规划
    examples:
      - 能帮我安排挂号路径吗？
      - 我想找医生看这个问题

demand_scenarios:
  strong:
    - 明确问就医决策、科室选择、急诊/门诊或检查路径。
  medium:
    - 主回答后需要医疗服务承接，但用户没有直接问挂号。
  weak:
    - 纯疾病科普、治疗方案或报告解读，无就医路径诉求。

