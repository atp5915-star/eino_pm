short_description: 智齿、颌骨、面部外伤、颞下颌关节和口腔颌面手术专项 Skill。
description: >-
  当用户咨询智齿、颌面肿痛、颌骨/面部外伤、颞下颌关节、口腔颌面肿物、正颌或颌面手术路径时触发。
  强需求直接回答；中相关性命中时，以服务卡承接口腔颌面专科问诊、挂号或手术评估服务。
capabilities:
  - 口腔颌面问题分流与风险判断
  - 智齿、拔牙和术后问题咨询
  - 面部外伤、颌骨异常和颞下颌关节问题就医建议
  - 口腔颌面手术评估路径承接

routing:
  direct_answer:
    enabled: true
    priority: 83
    description: 用户明确提到智齿、颌面外科、颌骨、颞下颌关节、面部外伤、口腔颌面肿物或颌面手术时直接回答。
    query_intents:
      - 智齿、拔牙、术后肿痛和干槽症担忧
      - 面部/颌骨外伤、肿胀、张口受限、咬合异常
      - 颞下颌关节弹响、疼痛、张口受限
      - 正颌、颌面手术或口腔颌面肿物评估
    examples:
      - 智齿发炎脸肿了怎么办？
      - 下巴被撞后咬合不对，要去哪里看？
      - 颞下颌关节弹响需要治疗吗？
  service_card:
    enabled: true
    priority: 58
    description: 用户只是牙痛、口腔不适或面部肿痛，但可能需要颌面外科承接时出卡。
    query_intents:
      - 口腔/面部症状可能需要专科医生评估
      - 需要手术评估、影像资料解读或挂号承接
    examples:
      - 牙痛脸也肿了，要不要看颌面外科？
      - 想找口腔颌面医生看看

demand_scenarios:
  strong:
    - 明确口腔颌面外科、智齿、颌骨、颞下颌关节、面部外伤或手术评估诉求。
  medium:
    - 普通牙痛、口腔不适或面部肿痛中存在颌面外科承接价值。
  weak:
    - 普通龋齿、洁牙、补牙等常规牙科问题，无颌面外科特征。

