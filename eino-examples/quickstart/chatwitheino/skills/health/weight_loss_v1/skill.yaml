id: weight_loss_v1
name: weight_loss_v1
display_name: 【管线】减肥与体重管理
domain: weight_management
owner: pending
version: v1.0
status: draft

short_description: 减肥、体重管理、饮食运动方案和医学减重专项 Skill。
description: >-
  当用户明确表达减肥、体重管理、饮食运动方案、平台期、反弹、药物减重或代谢风险管理诉求时触发。
  强需求直接回答；中相关性命中时，以服务卡承接体重管理计划、营养/医生服务或长期管理方案。
capabilities:
  - 体重管理路径判断
  - 饮食、运动和行为方案建议
  - 药物减重适应证、禁忌和就医边界提示
  - 代谢风险相关体重管理承接
  - 减肥食谱、健身计划、食谱打卡、训练打卡服务挂载
  - 拍照识别热量、BMI 计算服务追问

routing:
  direct_answer:
    enabled: true
    priority: 82
    description: 用户明确问减肥、瘦身、体重管理、药物减重或制定方案时直接回答。
    query_intents:
      - 减肥方案、饮食运动计划、平台期和反弹处理
      - BMI、体脂率、热量缺口、控糖等体重管理咨询
      - 司美格鲁肽、替尔泊肽、奥利司他等药物减重咨询
    examples:
      - 我 165cm 70kg，怎么减肥？
      - 司美格鲁肽减肥能不能用？
      - 减肥平台期怎么办？
  service_card:
    enabled: true
    priority: 62
    description: 用户有体重管理价值但主诉是体检异常、代谢问题或慢病风险时，在主回答后出卡承接。
    query_intents:
      - 脂肪肝、血糖血脂异常、高尿酸、多囊等需要体重管理辅助
      - 用户需要营养师、医生或长期计划服务
    examples:
      - 体检脂肪肝，医生说要减重
      - 血糖高是不是要控制体重？

demand_scenarios:
  strong:
    - 明确减肥、体重管理、药物减重或方案制定诉求。
  medium:
    - 代谢异常、慢病风险、体检异常中体重管理是重要干预项。
  weak:
    - 单纯饮食偏好、健身娱乐或非健康目的身材审美。

