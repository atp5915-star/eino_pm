service_card:
  enabled: true
  card_type:
    - service_mount
    - followup_bubbles
  title: 体重管理服务
  subtitle: 按当前意图挂载食谱、训练、打卡、热量识别和 BMI 计算能力。
  cta: 开始管理
  target:
    type: skill
    url: null
  trigger_policy:
    show_after_main_answer: true
    max_per_session: 1
    avoid_when_direct_answer: false
  mount_policy:
    max_cards_per_turn: 1
    dedupe_with_frontend_enrichment: true
    selection: 按用户当前最明确的意图只选择 1 个服务挂载小卡；不要一次输出多个服务小卡。
  mount_services:
    - key: weight_recipe
      title: 减肥食谱
      trigger: 问怎么吃、吃什么、食谱、饮食计划、控糖、轻断食、生酮、外卖选择，或需要把饮食框架落成每日菜单。
    - key: fitness_plan
      title: 健身计划
      trigger: 问怎么练、运动计划、减脂训练、力量训练、有氧安排，或需要结合运动建立热量缺口。
    - key: meal_checkin
      title: 食谱打卡
      trigger: 已有食谱/饮食方案，或表达想坚持、记录、监督、饮食复盘。
    - key: training_checkin
      title: 训练打卡
      trigger: 已有运动计划，或表达想坚持训练、记录运动、监督打卡、平台期需要调整训练。
  followup_bubbles:
    - text: 拍照识别这餐热量
      trigger: 提到一餐、菜、外卖、零食、奶茶、火锅、聚餐、食物热量不确定，或问这个能不能吃/热量高不高。
    - text: 帮我计算 BMI
      trigger: 给出身高体重、只给部分身高体重信息、问胖不胖/标准体重/需要减多少斤，或需要先判断减重必要性。

