short_description: 肺癌、肺结节、肺部肿瘤筛查和诊疗路径专项 Skill。
description: >-
  当用户围绕肺结节、肺癌筛查、肺部影像/病理结果、治疗方案、复查随访、靶向/免疫治疗或预后风险提问时触发。
  强需求直接回答；中相关性命中时，以服务卡承接肺癌筛查、报告解读、专科问诊或诊疗路径服务。
capabilities:
  - 肺结节和肺癌风险分层
  - 肺部影像、病理和肿瘤相关指标解读
  - 肺癌筛查、复查随访和就医路径建议
  - 肺癌治疗路径和专科问诊承接

routing:
  direct_answer:
    enabled: true
    priority: 88
    description: 用户明确提到肺癌、肺结节、肺部肿瘤、肺部占位或肺部病理/影像异常并需要判断或行动建议时直接回答。
    query_intents:
      - 肺结节风险判断和复查建议
      - 肺癌筛查、诊断、治疗或预后咨询
      - 肺部影像/病理/肿瘤标志物结果解读
    examples:
      - 肺部磨玻璃结节 8mm 严重吗？
      - 肺癌术后多久复查一次？
      - 这个肺部 CT 报告是不是癌？
  service_card:
    enabled: true
    priority: 60
    description: 用户有肺癌筛查或专科服务价值，但主诉不是肺癌强需求时，在主回答后出服务卡承接。
    query_intents:
      - 吸烟、长期咳嗽、胸痛、体检异常等可能需要肺癌筛查
      - 主回答后需要胸外科、呼吸科或肿瘤科医生服务
    examples:
      - 长期抽烟需要做肺癌筛查吗？
      - 体检肺部有阴影，要不要找医生看？

demand_scenarios:
  strong:
    - 明确肺癌/肺结节/肺部肿瘤/肺部占位相关判断、检查、治疗和随访诉求。
  medium:
    - 咳嗽、胸痛、吸烟、体检异常等与肺癌风险相关，但肺癌不是用户主诉。
  weak:
    - 普通感冒咳嗽、非肺部肿瘤的泛健康问题。

